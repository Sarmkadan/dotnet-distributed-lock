version: '3.8'

services:
  # PostgreSQL backend for distributed locks
  postgres:
    image: postgres:16-alpine
    container_name: distlock-postgres
    environment:
      POSTGRES_DB: distributed_locks
      POSTGRES_USER: lockuser
      POSTGRES_PASSWORD: lockpassword
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker-init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lockuser -d distributed_locks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - distlock-network

  # Redis backend for distributed locks
  redis:
    image: redis:7-alpine
    container_name: distlock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - distlock-network

  # SQLite example service (optional, uses file-based storage)
  # Define a custom service if needed for SQLite testing

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  distlock-network:
    driver: bridge

# Usage:
# docker-compose up                 # Start all services
# docker-compose down              # Stop all services
# docker-compose down -v           # Stop and remove volumes
#
# Connection strings:
# PostgreSQL:  Host=postgres;Database=distributed_locks;Username=lockuser;Password=lockpassword;Port=5432
# Redis:       localhost:6379
#
# Test connectivity:
# psql -h localhost -U lockuser -d distributed_locks -c "SELECT 1"
# redis-cli -h localhost ping
