services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distlock-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DistributedLock__BackendType=Redis
      - DistributedLock__ConnectionString=distlock-redis:6379
      - DistributedLock__EnableCaching=true
      - DistributedLock__UseFencingTokens=true
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - distlock-network

  postgres:
    image: postgres:16-alpine
    container_name: distlock-postgres
    environment:
      POSTGRES_DB: distributed_locks
      POSTGRES_USER: lockuser
      POSTGRES_PASSWORD: lockpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker-init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lockuser -d distributed_locks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - distlock-network

  redis:
    image: redis:7-alpine
    container_name: distlock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - distlock-network

volumes:
  app-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  distlock-network:
    driver: bridge
